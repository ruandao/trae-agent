<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trae Online Service</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3ecf8e;
      --warn: #f0c14b;
      --err: #f87171;
      --border: #2d3a4d;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    h1 { font-size: 1.15rem; font-weight: 600; margin: 0; }
    main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    h2 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 0 0 0.75rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
    }
    textarea { min-height: 120px; font-family: ui-monospace, monospace; font-size: 0.8rem; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-top: 0.5rem;
    }
    button.secondary { background: #334155; }
    button.danger { background: var(--err); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .row > div { flex: 1; min-width: 200px; }
    .status { font-size: 0.8rem; }
    .status.running { color: var(--warn); }
    .status.completed { color: var(--ok); }
    .status.failed, .status.interrupted { color: var(--err); }
    pre.out {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      overflow: auto;
      max-height: 220px;
      font-size: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .job-card { border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.75rem; }
    .job-card:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
    .meta { font-size: 0.78rem; color: var(--muted); }
    #sseLog {
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      max-height: 140px;
      overflow: auto;
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 6px;
    }
    .err-msg { color: var(--err); font-size: 0.85rem; margin-top: 0.5rem; }
    .file-panel { display: flex; gap: 1rem; flex-wrap: wrap; align-items: stretch; }
    .file-panel > div { flex: 1; min-width: 300px; }
    select.file-select { min-height: 280px; font-family: ui-monospace, monospace; font-size: 0.75rem; }

    .tree {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      max-height: 420px;
      overflow: auto;
      background: rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
    }
    .tree-node {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.18rem 0.25rem;
      border-radius: 6px;
      user-select: none;
      cursor: pointer;
    }
    .tree-node:hover { background: rgba(61,139,253,0.14); }
    .tree-toggle { width: 18px; display: inline-block; color: var(--muted); }
    .tree-children { margin-left: 14px; margin-top: 0.25rem; }
    .tree-more { margin-left: 14px; margin-top: 0.25rem; }
    .tree-path-meta { margin-top: 0.45rem; }
  </style>
</head>
<body>
  <header>
    <h1>Trae Online Service</h1>
    <p class="meta" style="margin:0.35rem 0 0">控制台 · 路径中的 AccessToken 已校验</p>
  </header>
  <main>
    <section>
      <h2>SSE 实时事件</h2>
      <p class="meta">订阅 <code>/api/events/stream?access_token=…</code></p>
      <div id="sseLog"></div>
    </section>
    <section>
      <h2>推送配置</h2>
      <p class="meta">写入 <code>onlineService/runtime/service_config.yaml</code></p>
      <label for="cfgYaml">YAML 内容</label>
      <textarea id="cfgYaml" placeholder="粘贴 service 配置…"></textarea>
      <button type="button" id="btnPushCfg">上传配置</button>
      <button type="button" class="secondary" id="btnPullCfg">拉取当前配置</button>
      <div class="err-msg" id="cfgErr"></div>
    </section>
    <section>
      <h2>新建任务</h2>
      <div class="row">
        <div>
          <label for="cmd">指令（trae-cli run）</label>
          <input type="text" id="cmd" placeholder="例如：列出当前目录" />
        </div>
        <div>
          <label for="parentId">父任务 ID（可选，叠加可写层）</label>
          <select id="parentId" title="基于当前任务列表；选「根层」则从新建层开始">
            <option value="">（无）根层 · 新建可写层</option>
          </select>
        </div>
      </div>
      <button type="button" id="btnRun">提交执行</button>
      <div class="err-msg" id="jobErr"></div>
    </section>
    <section>
      <h2>任务列表</h2>
      <button type="button" class="secondary" id="btnRefresh">刷新</button>
      <button type="button" class="danger" id="btnReset">重置（中断并清空）</button>
      <div class="err-msg" id="resetErr"></div>
      <div id="jobs"></div>
    </section>
    <section>
      <h2>可写层文件浏览</h2>
      <div class="row">
        <div>
          <label for="layerSelect">选择层（layer_id）</label>
          <select id="layerSelect"></select>
          <div class="meta" id="layerCommandMeta" style="margin-top:0.35rem;"></div>
        </div>
        <div>
          <label for="filePrefix">文件前缀过滤（可选）</label>
          <input type="text" id="filePrefix" placeholder="例如：src/ 或 README" />
        </div>
      </div>
      <div class="row" style="margin-top: 0.75rem;">
        <div>
          <label for="fileMaxBytes">最大读取字节（max_bytes）</label>
          <input type="number" id="fileMaxBytes" value="2000000" min="10000" max="20000000" step="10000" />
        </div>
        <div>
          <label for="fileMaxTextChars">最大展示字符（max_text_chars）</label>
          <input type="number" id="fileMaxTextChars" value="200000" min="1000" max="5000000" step="1000" />
        </div>
        <div>
          <label for="dirPageSize">目录分页大小（每次加载）</label>
          <input type="number" id="dirPageSize" value="200" min="10" max="2000" step="10" />
        </div>
      </div>

      <button type="button" id="btnLoadLayerFiles">刷新树</button>
      <div class="err-msg" id="layerFilesErr"></div>

      <div class="file-panel" style="margin-top: 0.75rem;">
        <div>
          <label>文件树（支持展开/翻页）</label>
          <div id="fileTree" class="tree"></div>
          <div class="meta" id="fileListMeta"></div>
        </div>
        <div>
          <label>文件内容</label>
          <pre class="out" id="fileContent" style="max-height: 420px; margin-top: 0.5rem;"></pre>
        </div>
      </div>
    </section>
    <section>
      <h2>查询父节点</h2>
      <div class="row">
        <div>
          <label for="lookupJob">任务 ID</label>
          <input type="text" id="lookupJob" />
        </div>
      </div>
      <button type="button" id="btnParent">查询上一层指令</button>
      <pre class="out" id="parentOut" style="max-height: 320px">{}</pre>
    </section>
  </main>
  <script>
    const ACCESS_TOKEN = JSON.parse('__ACCESS_TOKEN_JSON__');
    const api = (path, opts = {}) => {
      const u = new URL(path, location.origin);
      u.searchParams.set('access_token', ACCESS_TOKEN);
      return fetch(u.toString(), {
        ...opts,
        headers: {
          'X-Access-Token': ACCESS_TOKEN,
          ...(opts.headers || {}),
        },
      });
    };
    const logEl = document.getElementById('sseLog');
    function sseAppend(line) {
      const t = document.createElement('div');
      t.textContent = new Date().toISOString().slice(11, 19) + ' ' + line;
      logEl.appendChild(t);
      logEl.scrollTop = logEl.scrollHeight;
    }
    const es = new EventSource(
      '/api/events/stream?access_token=' + encodeURIComponent(ACCESS_TOKEN)
    );
    es.onmessage = (ev) => {
      try {
        const o = JSON.parse(ev.data);
        if (o.type === 'job_output') {
          sseAppend('output ' + o.job_id.slice(0, 8) + '…');
        } else {
          sseAppend(ev.data.slice(0, 200));
        }
        if (o.type === 'job_finished' || o.type === 'job_created') loadJobs();
        if (o.type === 'jobs_reset') {
          loadJobs();
          // jobs_reset 后可写层也会被清理，刷新树形 UI
          reloadLayerTree();
        }
      } catch (_) {
        sseAppend(ev.data.slice(0, 120));
      }
    };
    es.onerror = () => sseAppend('[SSE error / reconnecting]');

    document.getElementById('btnPushCfg').onclick = async () => {
      document.getElementById('cfgErr').textContent = '';
      const yaml = document.getElementById('cfgYaml').value;
      const fd = new FormData();
      fd.append('file', new Blob([yaml], { type: 'text/yaml' }), 'service_config.yaml');
      const u = new URL('/api/config', location.origin);
      u.searchParams.set('access_token', ACCESS_TOKEN);
      const r = await fetch(u, { method: 'POST', body: fd, headers: { 'X-Access-Token': ACCESS_TOKEN } });
      if (!r.ok) {
        document.getElementById('cfgErr').textContent = await r.text();
        return;
      }
      alert('配置已保存');
    };
    document.getElementById('btnPullCfg').onclick = async () => {
      document.getElementById('cfgErr').textContent = '';
      const r = await api('/api/config');
      if (!r.ok) {
        document.getElementById('cfgErr').textContent = await r.text();
        return;
      }
      const j = await r.json();
      document.getElementById('cfgYaml').value = j.yaml || '';
    };

    function fillParentJobSelect(jobs) {
      const sel = document.getElementById('parentId');
      const prev = sel.value;
      sel.replaceChildren();
      const root = document.createElement('option');
      root.value = '';
      root.textContent = '（无）根层 · 新建可写层';
      sel.appendChild(root);
      for (const j of jobs) {
        const o = document.createElement('option');
        o.value = j.id;
        const cmd = j.command || '';
        const short = cmd.length > 42 ? cmd.slice(0, 42) + '…' : cmd;
        o.textContent = `${short || j.id} · 层 ${j.layer_id}`;
        sel.appendChild(o);
      }
      if (prev && [...sel.options].some((opt) => opt.value === prev)) sel.value = prev;
    }

    async function loadJobs() {
      const r = await api('/api/jobs');
      const box = document.getElementById('jobs');
      if (!r.ok) {
        box.innerHTML = '<p class="err-msg">' + (await r.text()) + '</p>';
        return;
      }
      const { jobs } = await r.json();
      fillParentJobSelect(jobs);
      box.innerHTML = jobs
        .map(
          (j) => `
        <div class="job-card" data-id="${j.id}">
          <div class="meta">层: ${j.layer_id} · ${j.created_at}</div>
          <div><strong>${escapeHtml(j.command)}</strong></div>
          <div class="status ${j.status}">${j.status} ${j.exit_code != null ? '(exit ' + j.exit_code + ')' : ''}</div>
          <div class="meta">任务 ID: ${j.id} · 父: ${j.parent_job_id || '—'}</div>
          <pre class="out">${escapeHtml(j.output || '')}</pre>
          <button class="danger" data-interrupt="${j.id}" ${j.status !== 'running' ? 'disabled' : ''}>中断</button>
        </div>`
        )
        .join('');
      box.querySelectorAll('[data-interrupt]').forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute('data-interrupt');
          await api('/api/jobs/' + id + '/interrupt', { method: 'POST' });
          loadJobs();
        };
      });
    }
    function escapeHtml(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
    function setText(id, v) {
      const el = document.getElementById(id);
      if (el) el.textContent = v;
    }

    let treeCache = new Map(); // dirRelPath => { loaded: bool, nextOffset: number, truncated: bool }
    let treeRequestToken = 0;

    function getSelectedLayerId() {
      const layerSelect = document.getElementById('layerSelect');
      return (layerSelect.value || '').trim();
    }
    function getPrefixFilter() {
      return (document.getElementById('filePrefix').value || '').trim();
    }
    function getMaxBytes() {
      const v = parseInt(document.getElementById('fileMaxBytes').value || '2000000', 10);
      return isFinite(v) ? v : 2000000;
    }
    function getMaxTextChars() {
      const v = parseInt(document.getElementById('fileMaxTextChars').value || '200000', 10);
      return isFinite(v) ? v : 200000;
    }
    function getDirPageSize() {
      const v = parseInt(document.getElementById('dirPageSize').value || '200', 10);
      return isFinite(v) ? v : 200;
    }
    function baseName(relPath) {
      if (!relPath) return '';
      const parts = relPath.split('/').filter(Boolean);
      return parts[parts.length - 1] || relPath;
    }

    function clearLayerTreeUI() {
      treeCache = new Map();
      const treeEl = document.getElementById('fileTree');
      treeEl.innerHTML = '';
      document.getElementById('fileContent').textContent = '';
      document.getElementById('fileListMeta').textContent = '';
    }

    function updateLayerCommandMeta() {
      const metaEl = document.getElementById('layerCommandMeta');
      const sel = document.getElementById('layerSelect');
      if (!metaEl || !sel) return;
      const opt = sel.selectedOptions && sel.selectedOptions[0];
      const cmd = (opt && opt.dataset && opt.dataset.command) ? opt.dataset.command : '';
      if (cmd) {
        const short = cmd.length > 200 ? cmd.slice(0, 200) + '…' : cmd;
        metaEl.textContent = `命令: ${short}`;
      } else {
        metaEl.textContent = '命令: —';
      }
    }

    function createDirNode(dirRelPath, depthIgnored) {
      const wrapper = document.createElement('div');
      const row = document.createElement('div');
      row.className = 'tree-node';
      row.title = dirRelPath ? dirRelPath : '/';

      const toggle = document.createElement('span');
      toggle.className = 'tree-toggle';
      toggle.textContent = '+';

      const name = document.createElement('span');
      name.className = 'tree-dir-name';
      name.textContent = baseName(dirRelPath);

      row.appendChild(toggle);
      row.appendChild(name);

      const childrenEl = document.createElement('div');
      childrenEl.className = 'tree-children';
      childrenEl.style.display = 'none';

      const moreEl = document.createElement('div');
      moreEl.className = 'tree-more';

      wrapper.appendChild(row);
      wrapper.appendChild(childrenEl);
      wrapper.appendChild(moreEl);

      row.onclick = async () => {
        const cache = treeCache.get(dirRelPath) || { loaded: false, nextOffset: 0, truncated: false };
        if (!childrenEl || !moreEl) return;
        if (childrenEl.style.display === 'none') {
          // Expand
          childrenEl.style.display = 'block';
          moreEl.style.display = 'block';
          toggle.textContent = '-';
          if (!cache.loaded) {
            treeCache.set(dirRelPath, { ...cache, loading: true });
            await loadDirPage(dirRelPath, childrenEl, moreEl, 0, false);
          }
        } else {
          // Collapse
          childrenEl.style.display = 'none';
          moreEl.style.display = 'none';
          toggle.textContent = '+';
        }
      };

      return wrapper;
    }

    function createFileNode(fileRelPath, metaLine) {
      const row = document.createElement('div');
      row.className = 'tree-node';
      row.title = fileRelPath;
      row.textContent = '';

      const toggle = document.createElement('span');
      toggle.className = 'tree-toggle';
      toggle.textContent = ' ';

      const name = document.createElement('span');
      name.className = 'tree-file-name';
      name.textContent = baseName(fileRelPath);

      const spacer = document.createElement('span');
      spacer.style.marginLeft = '0.4rem';
      spacer.style.color = 'var(--muted)';
      spacer.style.fontSize = '0.7rem';
      spacer.textContent = metaLine || '';

      row.appendChild(toggle);
      row.appendChild(name);
      if (metaLine) row.appendChild(spacer);

      row.onclick = async () => {
        await loadLayerFileContent(fileRelPath);
      };

      return row;
    }

    async function loadLayers() {
      const errEl = document.getElementById('layerFilesErr');
      errEl.textContent = '';
      const sel = document.getElementById('layerSelect');
      const contentEl = document.getElementById('fileContent');
      const metaEl = document.getElementById('fileListMeta');

      sel.replaceChildren();
      contentEl.textContent = '';
      metaEl.textContent = '';

      const r = await api('/api/layers');
      if (!r.ok) {
        errEl.textContent = await r.text();
        return;
      }
      const j = await r.json();
      const layers = j.layers || [];
      if (!layers.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '（无可写层）';
        sel.appendChild(opt);
        updateLayerCommandMeta();
        return;
      }

      for (const l of layers) {
        const opt = document.createElement('option');
        opt.value = l.layer_id;
        const created = l.created_at ? `${l.created_at}` : '';
        const cmd = l.command ? ` · cmd: ${l.command}` : '';
        const txt = created ? `${l.layer_id} · ${created}${cmd}` : `${l.layer_id}${cmd}`;
        opt.textContent = txt.length > 140 ? txt.slice(0, 140) + '…' : txt;
        if (l.command) opt.dataset.command = l.command;
        sel.appendChild(opt);
      }
      sel.value = layers[0].layer_id;
      updateLayerCommandMeta();
      await reloadLayerTree();
    }

    async function loadDirPage(dirRelPath, childrenEl, moreEl, offset, append) {
      const errEl = document.getElementById('layerFilesErr');
      errEl.textContent = '';

      const token = treeRequestToken;
      const layerId = getSelectedLayerId();
      if (!layerId) return;

      const prefix = getPrefixFilter();
      const pageLimit = getDirPageSize();

      if (!append && offset === 0) {
        childrenEl.innerHTML = '';
      }

      // Avoid stale updates when user reloads the tree.
      if (token !== treeRequestToken) return;

      const url =
        `/api/layers/${encodeURIComponent(layerId)}/children` +
        `?dir=${encodeURIComponent(dirRelPath || '')}` +
        `&prefix=${encodeURIComponent(prefix)}` +
        `&offset=${offset}` +
        `&limit=${pageLimit}`;

      const r = await api(url);
      if (!r.ok) {
        errEl.textContent = await r.text();
        return;
      }
      const j = await r.json();

      if (token !== treeRequestToken) return;

      const entries = j.entries || [];
      if (!append && offset === 0 && entries.length === 0) {
        childrenEl.innerHTML = '<div class="meta">（无匹配条目）</div>';
      } else {
        for (const e of entries) {
          if (e.type === 'dir') {
            const node = createDirNode(e.path, 0);
            childrenEl.appendChild(node);
          } else {
            const metaLine = e.size ? `${e.size}B` : '';
            childrenEl.appendChild(createFileNode(e.path, metaLine));
          }
        }
      }

      treeCache.set(dirRelPath || '', {
        loaded: true,
        nextOffset: j.next_offset ?? (offset + entries.length),
        truncated: !!j.truncated,
      });

      if (j.truncated) {
        moreEl.innerHTML = '';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'secondary';
        btn.textContent = '加载更多';
        btn.onclick = async () => {
          const cache = treeCache.get(dirRelPath || '') || {};
          if (cache.loading) return;
          cache.loading = true;
          treeCache.set(dirRelPath || '', cache);
          await loadDirPage(dirRelPath, childrenEl, moreEl, cache.nextOffset || offset + entries.length, true);
          const after = treeCache.get(dirRelPath || '') || {};
          after.loading = false;
          treeCache.set(dirRelPath || '', after);
        };
        moreEl.appendChild(btn);
      } else {
        moreEl.innerHTML = '';
      }

      document.getElementById('fileListMeta').textContent =
        `目录: ${dirRelPath || '/'} · 当前加载: ${entries.length} · 总数: ${j.total ?? '-'}${j.truncated ? '（可继续加载）' : ''}`;
    }

    async function reloadLayerTree() {
      const layerId = getSelectedLayerId();
      if (!layerId) return;

      updateLayerCommandMeta();
      treeRequestToken += 1;
      clearLayerTreeUI();

      const treeEl = document.getElementById('fileTree');
      const rootChildren = document.createElement('div');
      const rootMore = document.createElement('div');
      rootMore.className = 'tree-more';
      treeEl.appendChild(rootChildren);
      treeEl.appendChild(rootMore);

      treeCache.set('', { loaded: false, nextOffset: 0, truncated: false });
      await loadDirPage('', rootChildren, rootMore, 0, false);
    }

    async function loadLayerFileContent(fileRelPath) {
      const errEl = document.getElementById('layerFilesErr');
      const layerId = getSelectedLayerId();
      const contentEl = document.getElementById('fileContent');
      const metaEl = document.getElementById('fileListMeta');
      errEl.textContent = '';

      if (!layerId || !fileRelPath) {
        contentEl.textContent = '';
        metaEl.textContent = '';
        return;
      }

      const segments = fileRelPath.split('/').map(encodeURIComponent).join('/');
      const r = await api(
        `/api/layers/${encodeURIComponent(layerId)}/files/${segments}` +
          `?max_bytes=${encodeURIComponent(getMaxBytes())}` +
          `&max_text_chars=${encodeURIComponent(getMaxTextChars())}`,
      );
      if (!r.ok) {
        errEl.textContent = await r.text();
        return;
      }

      const j = await r.json();
      if (j.kind === 'text') {
        const notice = j.truncated ? `[内容已截断: 原始 ${j.size}B，读取 ${j.read_bytes}B]\n\n` : '';
        contentEl.textContent = notice + (j.text || '');
        metaEl.textContent = `文件: ${j.path} · 原始 ${j.size}B · 读取 ${j.read_bytes}B`;
      } else if (j.kind === 'binary') {
        const prefix = (j.base64 || '').slice(0, 400);
        const more = (j.base64 || '').length > 400 ? '…' : '';
        const notice = j.truncated ? `（二进制内容已截断；原始 ${j.size}B，读取 ${j.read_bytes}B）\n` : '';
        contentEl.textContent = `${notice}二进制文件。\nbase64(前400字符):\n${prefix}${more}\n`;
        metaEl.textContent = `文件: ${j.path} · 原始 ${j.size}B · 读取 ${j.read_bytes}B · binary`;
      } else {
        contentEl.textContent = JSON.stringify(j, null, 2);
      }
    }

    document.getElementById('btnLoadLayerFiles').onclick = reloadLayerTree;
    document.getElementById('layerSelect').onchange = reloadLayerTree;
    document.getElementById('filePrefix').onchange = reloadLayerTree;
    document.getElementById('btnRefresh').onclick = loadJobs;
    document.getElementById('btnReset').onclick = async () => {
      const ok = confirm('确定要中断并清空所有任务吗？');
      if (!ok) return;
      document.getElementById('resetErr').textContent = '';
      const btn = document.getElementById('btnReset');
      btn.disabled = true;
      try {
        const r = await api('/api/jobs/reset', { method: 'POST' });
        if (!r.ok) {
          document.getElementById('resetErr').textContent = await r.text();
          return;
        }
        await r.json().catch(() => null);
        loadJobs();
        reloadLayerTree();
      } finally {
        btn.disabled = false;
      }
    };
    document.getElementById('btnRun').onclick = async () => {
      document.getElementById('jobErr').textContent = '';
      const command = document.getElementById('cmd').value.trim();
      const parent_job_id = document.getElementById('parentId').value.trim() || null;
      const r = await api('/api/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command, parent_job_id }),
      });
      if (!r.ok) {
        document.getElementById('jobErr').textContent = await r.text();
        return;
      }
      document.getElementById('cmd').value = '';
      loadJobs();
    };
    document.getElementById('btnParent').onclick = async () => {
      const id = document.getElementById('lookupJob').value.trim();
      const r = await api('/api/jobs/' + encodeURIComponent(id) + '/parent');
      const pre = document.getElementById('parentOut');
      pre.textContent = JSON.stringify(await r.json(), null, 2);
    };
    loadJobs();
    loadLayers();
  </script>
</body>
</html>
